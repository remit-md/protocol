[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = false

[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

# Script profile: enable via-IR to avoid stack-too-deep in deploy scripts
[profile.script]
via_ir = true
optimizer = true
optimizer_runs = 200

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
