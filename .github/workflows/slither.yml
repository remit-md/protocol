name: Slither

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'

permissions:
  contents: read

jobs:
  slither:
    runs-on: ubuntu-latest
    # Informational only — does not block merges
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1

      - name: Build (required for Slither)
        run: forge build --build-info

      - name: Run Slither
        uses: crytic/slither-action@6918a2fdd17e52e5ae3cda55f1b57ca91b82a15a # v0.4.0
        with:
          target: src/
          slither-args: --filter-paths "test|lib|script" --no-fail-pedantic
          fail-on: none
