name: Slither

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'

permissions:
  contents: read

jobs:
  slither:
    runs-on: ubuntu-latest
    # Informational only — does not block merges
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8f1998e9878d8b76b5028c7f22289a70ed447e09 # v1.2.0

      - name: Build (required for Slither)
        run: forge build --build-info

      - name: Run Slither
        uses: crytic/slither-action@6918a2fdd17e52e5ae3cda55f1b57ca91b82a15a # v0.4.0
        with:
          target: src/
          slither-args: --filter-paths "test|lib|script" --no-fail-pedantic
          fail-on: none
