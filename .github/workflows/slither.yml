name: Slither

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'

permissions:
  contents: read

jobs:
  slither:
    runs-on: ubuntu-latest
    # Informational only — does not block merges
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1

      - name: Build (required for Slither)
        run: forge build --build-info

      - name: Run Slither
        uses: crytic/slither-action@f197989dea5b53e986d0f88c60a034ddd77ec9a8 # v0.4.0
        with:
          target: src/
          slither-args: --filter-paths "test|lib|script" --no-fail-pedantic
          fail-on: none
