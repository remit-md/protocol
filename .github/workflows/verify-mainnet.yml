name: Verify Mainnet Contracts

concurrency:
  group: verify-mainnet
  cancel-in-progress: false

on:
  workflow_dispatch:

# Verifies all contracts deployed by DeployMainnet.s.sol on Base mainnet (chain 8453).
#
# Uses Blockscout (base.blockscout.com) — free, no API key, supports Base mainnet natively.
#
# NOTE: Basescan (basescan.org) verification requires a paid Etherscan plan for Base mainnet
# (the Etherscan V2 unified API charges per-chain for non-Ethereum chains). Blockscout is the
# automated alternative. For Basescan: manually submit source via basescan.org/verifyContract
# or upgrade the Etherscan API plan.
#
# Addresses are hardcoded (immutable once deployed). Update if contracts are redeployed.

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1
        with:
          version: stable

      - name: Build
        run: forge build

      - name: Verify contracts on Blockscout (Base mainnet)
        env:
          RPC_URL: ${{ secrets.ALCHEMY_BASE_MAINNET_URL }}
        run: |
          set +e  # Don't abort on first failure — verify all, report at end

          # Blockscout: free, no API key, supports Base mainnet
          # https://base.blockscout.com
          V="--chain 8453 \
             --verifier blockscout \
             --verifier-url https://base.blockscout.com/api \
             --rpc-url $RPC_URL \
             --guess-constructor-args \
             --watch"

          FAILED=0

          echo "=== Verifying UUPS implementations ==="

          echo "Verifying RemitFeeCalculator impl (0xae8B402...)..."
          forge verify-contract 0xae8B402c79003f537631E2F30C3fE9924a649126 \
            src/RemitFeeCalculator.sol:RemitFeeCalculator $V || FAILED=$((FAILED+1))

          echo "Verifying RemitRouter impl (0x820982...)..."
          forge verify-contract 0x820982f3a311Dfa5E27075076dE8e322507e8F71 \
            src/RemitRouter.sol:RemitRouter $V || FAILED=$((FAILED+1))

          echo ""
          echo "=== Verifying ERC1967 proxies ==="

          echo "Verifying FeeCalculator proxy (0x463695...)..."
          forge verify-contract 0x463695aA6BAF2473cdE1273CEdFB4a9e8e86b9b7 \
            lib/openzeppelin-contracts/contracts/proxy/ERC1967/ERC1967Proxy.sol:ERC1967Proxy $V || FAILED=$((FAILED+1))

          echo "Verifying Router proxy (0xAf2e21...)..."
          forge verify-contract 0xAf2e211BC585D3Ab37e9BD546Fb25747a09254D2 \
            lib/openzeppelin-contracts/contracts/proxy/ERC1967/ERC1967Proxy.sol:ERC1967Proxy $V || FAILED=$((FAILED+1))

          echo ""
          echo "=== Verifying immutable contracts ==="

          echo "Verifying RemitKeyRegistry (0xB08B61...)..."
          forge verify-contract 0xB08B61453EbDeB3BA341458bF067f29F93F7BF0F \
            src/RemitKeyRegistry.sol:RemitKeyRegistry $V || FAILED=$((FAILED+1))

          echo "Verifying RemitEscrow (0xC2BC70...)..."
          forge verify-contract 0xC2BC7022cEe32aC8293719e212a4DBe47b3c646B \
            src/RemitEscrow.sol:RemitEscrow $V || FAILED=$((FAILED+1))

          echo "Verifying RemitTab (0x7FC5B3...)..."
          forge verify-contract 0x7FC5B33Ba6dfB5C3345922E67B1D48356F4b592b \
            src/RemitTab.sol:RemitTab $V || FAILED=$((FAILED+1))

          echo "Verifying RemitStream (0xC2D32d...)..."
          forge verify-contract 0xC2D32d9aC96Bc7B6Ef8c093E2Aced7f9AdE1D0Ac \
            src/RemitStream.sol:RemitStream $V || FAILED=$((FAILED+1))

          echo "Verifying RemitBounty (0x6cf057...)..."
          forge verify-contract 0x6cf0570078c831440866ad60dd4ff43ef676f5bb \
            src/RemitBounty.sol:RemitBounty $V || FAILED=$((FAILED+1))

          echo "Verifying RemitDeposit (0x888E6b...)..."
          forge verify-contract 0x888E6b0f66d64C98Fec93dcC615f4A06318754A4 \
            src/RemitDeposit.sol:RemitDeposit $V || FAILED=$((FAILED+1))

          echo ""
          echo "=== Verification Summary ==="
          if [ "$FAILED" -gt 0 ]; then
            echo "FAILED: $FAILED contract(s) failed to verify on Blockscout."
            echo "Check output above. For Basescan: upgrade Etherscan plan or verify manually."
            exit 1
          else
            echo "All 10 contracts verified successfully on Blockscout (base.blockscout.com)."
          fi
