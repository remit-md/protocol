name: Deploy Testnet

concurrency:
  group: deploy-testnet
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      script:
        description: "Forge script to run (e.g. UpgradeRouter.s.sol)"
        required: true
        type: choice
        options:
          - UpgradeRouter.s.sol
          - RedeployContracts.s.sol
          - RedeployEscrow.s.sol
          - RedeployTab.s.sol
          - RedeployStream.s.sol
          - RedeployBounty.s.sol
          - RedeployDeposit.s.sol
          - RedeployMockUSDC.s.sol
          - DeployOnrampVault.s.sol
          - UpgradeFeeCalculator.s.sol
          - DeployTestnet.s.sol
          - AuthorizeDeployerAsRelayer.s.sol
          - TestRouterMigration.s.sol
      dry_run:
        description: "Simulate only (no broadcast)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: testnet
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1

      - name: Build
        run: forge build

      - name: Run deploy script
        env:
          FOUNDRY_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ALCHEMY_BASE_SEPOLIA_URL: ${{ secrets.ALCHEMY_BASE_SEPOLIA_URL }}
        run: |
          FLAGS="--rpc-url $ALCHEMY_BASE_SEPOLIA_URL -vvvv"
          if [ "${{ inputs.dry_run }}" = "false" ]; then
            FLAGS="$FLAGS --broadcast"
          fi
          forge script script/${{ inputs.script }} --private-key "$FOUNDRY_PRIVATE_KEY" $FLAGS

      - name: Upload broadcast artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: broadcast-testnet-${{ github.run_number }}
          path: broadcast/**/*.json
          retention-days: 90
