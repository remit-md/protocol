name: Deploy Mainnet

concurrency:
  group: deploy-mainnet
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Simulate only (no broadcast)"
        required: false
        type: boolean
        default: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build
        run: forge build

      - name: Run mainnet deploy script
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.MAINNET_DEPLOYER_PRIVATE_KEY }}
          RPC_URL: ${{ secrets.ALCHEMY_BASE_MAINNET_URL }}
          GNOSIS_SAFE: ${{ secrets.GNOSIS_SAFE_ADDRESS }}
          FEE_WALLET: ${{ secrets.MAINNET_FEE_WALLET }}
          USDC: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
        run: |
          FLAGS="--rpc-url $RPC_URL --private-key $DEPLOYER_PRIVATE_KEY -vvvv"
          if [ "${{ inputs.dry_run }}" = "false" ]; then
            # --slow: send one tx at a time, wait for confirmation before the next.
            # Prevents Alchemy 429 rate limits from aborting the broadcast mid-deploy.
            # --verifier blockscout: free, no API key required. Basescan requires $49/mo paid plan for Base mainnet.
            FLAGS="$FLAGS --broadcast --slow --verify --verifier blockscout --verifier-url https://base.blockscout.com/api"
          fi
          forge script script/DeployMainnet.s.sol $FLAGS
