name: Deploy Mainnet

concurrency:
  group: deploy-mainnet
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      script:
        description: "Forge script to run"
        required: true
        type: choice
        options:
          - DeployMainnet.s.sol
          - RedeployBountyMainnet.s.sol
      dry_run:
        description: "Simulate only (no broadcast)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1

      - name: Build
        run: forge build

      - name: Run mainnet deploy script
        env:
          FOUNDRY_PRIVATE_KEY: ${{ secrets.MAINNET_DEPLOYER_PRIVATE_KEY }}
          RPC_URL: ${{ secrets.ALCHEMY_BASE_MAINNET_URL }}
          GNOSIS_SAFE: ${{ secrets.GNOSIS_SAFE_ADDRESS }}
          FEE_WALLET: ${{ secrets.MAINNET_FEE_WALLET }}
          USDC: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
        run: |
          FLAGS="--rpc-url $RPC_URL -vvvv"
          if [ "${{ inputs.dry_run }}" = "false" ]; then
            # --slow: send one tx at a time, wait for confirmation before the next.
            # Prevents Alchemy 429 rate limits from aborting the broadcast mid-deploy.
            # --verifier blockscout: free, no API key required. Basescan requires $49/mo paid plan for Base mainnet.
            FLAGS="$FLAGS --broadcast --slow --verify --verifier blockscout --verifier-url https://base.blockscout.com/api"
          fi
          forge script script/${{ inputs.script }} --private-key "$FOUNDRY_PRIVATE_KEY" $FLAGS

      - name: Upload broadcast artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: broadcast-mainnet-${{ github.run_number }}
          path: broadcast/**/*.json
          retention-days: 90
