name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8f1998e9878d8b76b5028c7f22289a70ed447e09 # v1.2.0

      - name: Build
        run: forge build

      - name: Test
        run: forge test -vvv

      - name: Format check
        run: forge fmt --check
