name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: [self-hosted, linux, x64]
    # Foundry (forge, anvil, cast) is pre-installed on the self-hosted runner.
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: forge build

      - name: Test
        run: forge test -vvv

      - name: Format check
        run: forge fmt --check
